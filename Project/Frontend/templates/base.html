<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}FreeLancer Pro{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #16161f;
  --bg4: #1c1c28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --accent-glow: rgba(108,99,255,0.25);
  --gold: #f59e0b;
  --gold-light: #fcd34d;
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.1);
  --text: #f1f0ff;
  --text2: #9ca3af;
  --text3: #6b7280;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}
/* ── NAVBAR ── */
.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-brand {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 800;
  color: var(--text);
  text-decoration: none;
  display: flex; align-items: center; gap: 10px;
}
.nav-brand .logo-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.nav-links { display: flex; align-items: center; gap: 0.5rem; }
.nav-link {
  color: var(--text2); text-decoration: none; font-size: 0.875rem;
  padding: 6px 14px; border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.nav-link:hover, .nav-link.active { color: var(--text); background: var(--bg3); }
.nav-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  margin-left: 4px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 7px; padding: 9px 20px;
  border-radius: var(--radius-sm); border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
  transition: all 0.2s; text-decoration: none; white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 20px var(--accent-glow);
}
.btn-primary:hover { background: #7c73ff; transform: translateY(-1px); box-shadow: 0 4px 24px var(--accent-glow); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.btn-success:hover { background: rgba(16,185,129,0.2); }
.btn-sm { padding: 6px 14px; font-size: 0.8125rem; }
.btn-lg { padding: 12px 28px; font-size: 1rem; }
/* ── LAYOUT ── */
.page-wrapper { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }
.page-header { margin-bottom: 2.5rem; }
.page-title {
  font-family: var(--font-display); font-size: 1.875rem; font-weight: 700;
  color: var(--text);
}
.page-subtitle { color: var(--text2); margin-top: 0.375rem; font-size: 0.9375rem; }
/* ── CARDS ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover { border-color: var(--border2); }
.card-hover:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
/* ── FORM ── */
.form-group { margin-bottom: 1.25rem; }
.form-label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--text2); margin-bottom: 0.5rem; letter-spacing: 0.02em; text-transform: uppercase; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--text); font-family: var(--font-body); font-size: 0.9375rem;
  padding: 10px 14px; transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
.form-select option { background: var(--bg3); }
.form-textarea { resize: vertical; min-height: 100px; }
/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
}
.badge-low { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.badge-medium { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
.badge-high { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.badge-open { background: rgba(108,99,255,0.12); color: var(--accent2); border: 1px solid rgba(108,99,255,0.2); }
.badge-closed { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }
.badge-accepted { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.badge-rejected { background: var(--red-bg); color: var(--red); }
.badge-pending { background: var(--yellow-bg); color: var(--yellow); }
/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
@media(max-width: 900px) { .grid-4, .grid-3 { grid-template-columns: 1fr 1fr; } }
@media(max-width: 640px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }
/* ── STAT CARDS ── */
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1.5rem;
}
.stat-label { font-size: 0.75rem; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-family: var(--font-display); font-size: 1.875rem; font-weight: 700; margin-top: 0.375rem; color: var(--text); }
.stat-change { font-size: 0.8125rem; color: var(--text3); margin-top: 0.25rem; }
/* ── ALERTS ── */
.alert { padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 1rem; font-size: 0.875rem; display: flex; align-items: flex-start; gap: 10px; }
.alert-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.alert-error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.alert-warning { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
.alert-info { background: rgba(108,99,255,0.1); color: var(--accent2); border: 1px solid rgba(108,99,255,0.2); }
/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  z-index: 1000; display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 2rem;
  width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from{opacity:0;transform:scale(0.95)translateY(8px)} to{opacity:1;transform:none} }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.modal-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text3); font-size: 1.5rem; cursor: pointer; line-height: 1; padding: 4px; }
.modal-close:hover { color: var(--text); }
/* ── DIVIDER ── */
.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
/* ── TOAST ── */
#toast-container { position: fixed; top: 80px; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
.toast {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--radius-sm);
  padding: 12px 18px; font-size: 0.875rem;
  box-shadow: var(--shadow); pointer-events: all;
  animation: toastIn 0.3s ease; max-width: 320px;
  display: flex; align-items: center; gap: 10px;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--accent); }
@keyframes toastIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }
/* ── TABS ── */
.tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg3); border-radius: var(--radius-sm); margin-bottom: 1.5rem; width: fit-content; }
.tab-btn { padding: 7px 18px; border-radius: 6px; border: none; background: none; color: var(--text2); font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
.tab-btn.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
/* ── SKILL TAGS ── */
.skill-tag { display: inline-flex; padding: 3px 10px; background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.2); color: var(--accent2); border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
/* ── PROGRESS BAR ── */
.progress-bar { height: 6px; background: var(--bg4); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s ease; }
/* ── LOADING ── */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
/* ── NOTIFICATION DROPDOWN ── */
.notif-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: 360px; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); box-shadow: var(--shadow);
  z-index: 200; display: none; overflow: hidden;
}
.notif-dropdown.open { display: block; }
.notif-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.notif-item { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.8125rem; display: flex; gap: 10px; }
.notif-item.unread { background: rgba(108,99,255,0.05); }
.notif-item:last-child { border-bottom: none; }
.notif-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 4rem 2rem; }
.empty-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
.empty-text { color: var(--text2); margin-bottom: 1.5rem; }
/* ── MISC ── */
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.mt-1 { margin-top: 0.25rem; }
.mt-2 { margin-top: 0.5rem; }
.mt-4 { margin-top: 1rem; }
.mb-4 { margin-bottom: 1rem; }
.text-sm { font-size: 0.8125rem; }
.text-xs { font-size: 0.75rem; }
.text-accent { color: var(--accent2); }
.text-muted { color: var(--text2); }
.text-danger { color: var(--red); }
.text-success { color: var(--green); }
.font-display { font-family: var(--font-display); }
.font-bold { font-weight: 700; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-brand">
    <div class="logo-dot"></div>
    FreeLancer Pro
  </a>
  <div class="nav-links">
    {% if session.user_id %}
      <a href="/dashboard" class="nav-link {% if request.path=='/dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/jobs" class="nav-link {% if request.path.startswith('/jobs') %}active{% endif %}">Browse Jobs</a>
      <a href="/escrow" class="nav-link {% if request.path=='/escrow' %}active{% endif %}">Escrow</a>
      <div style="position:relative">
        <button class="nav-link btn-ghost btn btn-sm" id="notif-btn" onclick="toggleNotif()" style="border:none">
          🔔 <span class="nav-badge" id="notif-count" style="display:none">0</span>
        </button>
        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-header">
            <span style="font-weight:600;font-size:.875rem">Notifications</span>
            <button class="btn btn-sm btn-ghost" onclick="markRead()" style="font-size:.75rem;padding:4px 10px">Mark all read</button>
          </div>
          <div id="notif-list"><div style="padding:2rem;text-align:center;color:var(--text3)">Loading...</div></div>
        </div>
      </div>
      <a href="/profile" class="nav-link {% if request.path=='/profile' %}active{% endif %}">Profile</a>
      <button onclick="logout()" class="btn btn-ghost btn-sm">Sign out</button>
    {% else %}
      <a href="/login" class="nav-link">Sign in</a>
      <a href="/register" class="btn btn-primary btn-sm">Get started</a>
    {% endif %}
  </div>
</nav>

<div id="toast-container"></div>

{% block content %}{% endblock %}

<script>
function showToast(msg, type='info') {
  const icons = {success:'✅', error:'❌', info:'ℹ️', warning:'⚠️'};
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(20px)'; t.style.transition='all .3s'; setTimeout(()=>t.remove(), 300); }, 3500);
}

async function apiFetch(url, opts={}) {
  const defaults = { headers: {'Content-Type':'application/json'}, ...opts };
  const res = await fetch(url, defaults);
  const data = await res.json();
  return { ok: res.ok, status: res.status, data };
}

function logout() {
  fetch('/api/logout', {method:'POST'}).then(()=>{ window.location.href='/'; });
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Notification system
let notifOpen = false;
function toggleNotif() {
  notifOpen = !notifOpen;
  document.getElementById('notif-dropdown').classList.toggle('open', notifOpen);
  if (notifOpen) loadNotifications();
}
document.addEventListener('click', e => {
  if (!e.target.closest('#notif-btn') && !e.target.closest('#notif-dropdown')) {
    notifOpen = false;
    document.getElementById('notif-dropdown')?.classList.remove('open');
  }
});
async function loadNotifications() {
  const { data } = await apiFetch('/api/notifications');
  const list = document.getElementById('notif-list');
  const countEl = document.getElementById('notif-count');
  if (!data.notifications?.length) {
    list.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text3)">No notifications</div>';
    if(countEl) countEl.style.display='none';
    return;
  }
  const unread = data.notifications.filter(n=>!n.is_read).length;
  if (countEl) { countEl.textContent=unread; countEl.style.display=unread?'inline-flex':'none'; }
  const typeIcons = {success:'🎉', warning:'⚠️', info:'💬', error:'❌'};
  list.innerHTML = data.notifications.map(n=>`
    <div class="notif-item ${n.is_read?'':'unread'}">
      <span class="notif-icon">${typeIcons[n.type]||'💬'}</span>
      <div>
        <div style="color:var(--text)">${n.message}</div>
        <div class="text-xs text-muted mt-1">${new Date(n.created_at).toLocaleString()}</div>
      </div>
    </div>`).join('');
}
async function markRead() {
  await apiFetch('/api/notifications/read', {method:'POST'});
  document.getElementById('notif-count').style.display='none';
  loadNotifications();
}
// Load unread count on page load
{% if session.user_id %}
(async()=>{
  const {data}=await apiFetch('/api/notifications');
  const unread=(data.notifications||[]).filter(n=>!n.is_read).length;
  const el=document.getElementById('notif-count');
  if(el&&unread){ el.textContent=unread; el.style.display='inline-flex'; }
})();
{% endif %}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
