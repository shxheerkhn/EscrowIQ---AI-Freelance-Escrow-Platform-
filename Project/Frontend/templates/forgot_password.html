{% extends "base.html" %}
{% block title %}Reset Password - EscrowIQ{% endblock %}
{% block content %}
<div class="page-wrapper" style="max-width:620px;padding-top:2rem;padding-bottom:3rem">
  <section class="card">
    <div class="page-header" style="margin-bottom:1.1rem">
      <h1 class="page-title" style="font-size:1.7rem">Reset your password</h1>
      <p class="page-subtitle">Request a reset code, then set a new password from the same screen.</p>
    </div>
    <div id="alert-box"></div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" value="{{ preset_email }}">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <button class="btn btn-ghost w-full" onclick="requestReset()" id="request-btn">Send reset code</button>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Reset Code</label>
        <input type="text" id="code" class="form-input" placeholder="6-digit code" maxlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="password" class="form-input" placeholder="At least 6 characters">
      </div>
    </div>
    <button class="btn btn-gradient w-full" onclick="resetPassword()" id="reset-btn">Update password</button>
    <div class="divider-text">or</div>
    <div style="text-align:center;font-size:.92rem;color:var(--text2)">
      Back to <a href="/login" style="color:var(--cyan2);font-weight:700;text-decoration:none">sign in</a>
    </div>
  </section>
</div>
{% endblock %}
{% block scripts %}
<script>
async function requestReset() {
  const email = document.getElementById('email').value.trim();
  const box = document.getElementById('alert-box');
  const btn = document.getElementById('request-btn');
  if (!email) {
    box.innerHTML = '<div class="alert alert-error">Enter your email first.</div>';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Sending code';
  const { ok, data } = await apiFetch('/api/auth/request-password-reset', {
    method: 'POST',
    body: JSON.stringify({ email })
  });
  box.innerHTML = `<div class="alert ${ok ? 'alert-success' : 'alert-error'}">${ok ? data.message : data.error}</div>`;
  btn.disabled = false;
  btn.textContent = 'Send reset code';
}

async function resetPassword() {
  const email = document.getElementById('email').value.trim();
  const code = document.getElementById('code').value.trim();
  const password = document.getElementById('password').value;
  const box = document.getElementById('alert-box');
  const btn = document.getElementById('reset-btn');
  if (!email || !code || !password) {
    box.innerHTML = '<div class="alert alert-error">Email, code, and new password are required.</div>';
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Updating';
  const { ok, data } = await apiFetch('/api/auth/reset-password', {
    method: 'POST',
    body: JSON.stringify({ email, code, password })
  });
  if (ok) {
    box.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
    setTimeout(() => { window.location.href = data.redirect || '/login'; }, 900);
  } else {
    box.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
    btn.disabled = false;
    btn.textContent = 'Update password';
  }
}
</script>
{% endblock %}
