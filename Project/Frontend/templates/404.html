{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center">
  <div>
    <div style="font-size:6rem;line-height:1;margin-bottom:1rem">🔍</div>
    <h1 style="font-family:var(--font-display);font-size:3rem;font-weight:800;color:var(--text);margin-bottom:.75rem">404</h1>
    <p style="font-size:1.125rem;color:var(--text2);margin-bottom:2rem">This page doesn't exist or was moved.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
      <a href="/" class="btn btn-primary">Go to Home</a>
      {% if session.user_id %}
      <a href="/dashboard" class="btn btn-ghost">Dashboard</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
